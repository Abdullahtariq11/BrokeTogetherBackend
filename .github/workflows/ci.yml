name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: chmod +x ./mvnw && ./mvnw test -B --no-transfer-progress
        env:
          CI: true
          # Dummy values — the context-loading test is skipped in CI,
          # and all other tests use mocked dependencies (no DB needed)
          DATABASE_URL: jdbc:postgresql://localhost:5432/dummy
          DATABASE_USERNAME: dummy
          DATABASE_PASSWORD: dummy
          JWT_SECRET: ci-test-secret-key-that-is-long-enough-for-hs512-algorithm-requirement-minimum-64-bytes-needed
          JWT_EXPIRATION: 86400000

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/
          retention-days: 7
